kind = "web"
previewPath = "/"
title = "Test Hazırlayıcı Pro"
version = "1.0.0"
id = "artifacts/test-hazirlayici"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19915

[services.development]
run = "pnpm --filter @workspace/test-hazirlayici run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/test-hazirlayici", "run", "build" ]
publicDir = "artifacts/test-hazirlayici/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19915"
BASE_PATH = "/"
